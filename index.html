<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Asientos - PLANTA BAJA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght=700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000033;
            --accent: #eb5e28;
            --disponible: #008744;
            --seleccionado: #f1c40f;
            --ocupado: #d32f2f;
            --bg-body: #0f172a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 430px;
            background-color: #ffffff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 92vh;
        }

        .app-header {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            text-align: center;
        }
        .app-header h1 { font-family: 'Urbanist', sans-serif; margin: 0; font-size: 16px; }

        /* CONTENEDOR CON SCROLL PARA EL MAPA REAL */
        .map-area {
            flex-grow: 1;
            overflow: auto; /* Permite zoom y scroll libre en móvil */
            background-color: #f8fafc;
            position: relative;
            padding: 10px;
        }

        /* LIENZO DEL PLANO REAL (Fiel a las proporciones del papel) */
        .canvas-plano {
            width: 390px;
            height: 520px;
            position: relative;
            margin: 0 auto;
        }

        .stage-box {
            position: absolute;
            top: 0;
            left: 75px;
            width: 180px;
            height: 45px;
            background-color: #008744;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Urbanist', sans-serif;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        /* MUROS REALES DEL LUGAR (Líneas rojas del croquis) */
        .muro-izq {
            position: absolute;
            top: 55px;
            left: 0;
            width: 75px;
            height: 4px;
            background-color: #d32f2f;
        }
        .muro-separador-r2 {
            position: absolute;
            top: 55px;
            left: 55px;
            width: 4px;
            height: 125px;
            background-color: #d32f2f;
        }

        /* ELEMENTOS DEL PLANO (Posiciones exactas) */
        .mesa {
            position: absolute;
            background-color: #008744;
            color: white;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 3px;
        }
        
        .mesa.v { width: 24px; height: 45px; }
        .mesa.h { width: 45px; height: 24px; }
        .mesa.rombo { width: 35px; height: 35px; transform: rotate(45deg); }
        .mesa.rombo span { transform: rotate(-45deg); }

        /* SILLAS INDIVIDUALES CON POSICIÓN FIJA */
        .silla {
            position: absolute;
            width: 18px;
            height: 18px;
            background-color: var(--disponible);
            color: white;
            font-size: 8px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 3px;
            cursor: pointer;
            user-select: none;
        }
        .silla.selected { background-color: var(--seleccionado); color: #000; }
        .silla.occupied { background-color: var(--ocupado); cursor: not-allowed; }

        /* --- DETALLE DE UBICACIONES REALES --- */

        /* Cuarto oculto izquierdo: Barra R-2 y sus sillas */
        .r2-box { position: absolute; top: 70px; left: 15px; width: 22px; height: 75px; background: #008744; color: white; font-size: 9px; display: flex; align-items: center; justify-content: center; border-radius: 2px; }
        
        /* Sillas ocultas de R-2 detrás del muro vertical */
        .s42 { top: 65px; left: 3Pointer; top: 65px; left: 42px; }
        .s41 { top: 65px; left: 20px; }
        .s43 { top: 80px; left: -8px; }
        .s44 { top: 100px; left: -8px; }

        /* Mesa 5 y 4 arriba al centro */
        .m5 { top: 65px; left: 90px; }
        .s1 { top: 68px; left: 70px; }
        .s2 { top: 88px; left: 70px; }

        /* Mesa 6 (Rombo Central) */
        .m6 { top: 130px; left: 100px; }
        .s52 { top: 105px; left: 108px; }
        .s53 { top: 138px; left: 75px; }
        .s55 { top: 172px; left: 108px; }
        .s57 { top: 138px; left: 140px; }

        /* Mesa 3 y Pasillo Derecho */
        .m3 { top: 230px; left: 150px; }
        .s94 { top: 208px; left: 150px; }
        .s95 { top: 208px; left: 172px; }
        .s92 { top: 258px; left: 150px; }
        .s93 { top: 258px; left: 172px; }

        /* BARRA DE CONTROL INFERIOR */
        .checkout-bar {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .legend-bar { display: flex; justify-content: space-around; font-size: 10px; color: #64748b; }
        .legend-i { display: flex; align-items: center; gap: 4px; }
        .legend-c { width: 10px; height: 10px; border-radius: 2px; }
        .btn-reservation { background-color: var(--primary); color: white; text-align: center; padding: 12px; border-radius: 10px; font-weight: bold; border: none; width: 100%; display: none; font-size: 13px;}
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <header class="app-header">
            <h1>SELECCIONA TU ASIENTO</h1>
        </header>

        <div class="map-area">
            <div class="canvas-plano">
                
                <div class="stage-box">ESCENARIO</div>
                <div class="muro-izq"></div>
                <div class="muro-separador-r2"></div>

                <div class="r2-box">R-2</div>
                <div class="silla s41" data-id="41">41</div>
                <div class="silla s42" data-id="42">42</div>
                <div class="silla s43" data-id="43">43</div>
                <div class="silla s44 occupied" data-id="44">44</div> <div class="mesa h m5">M-5</div>
                <div class="silla s1" data-id="1">1</div>
                <div class="silla s2" data-id="2">2</div>

                <div class="mesa rombo m6"><span>M-6</span></div>
                <div class="silla s52" data-id="52">52</div>
                <div class="silla s53" data-id="53">53</div>
                <div class="silla s55" data-id="55">55</div>
                <div class="silla s57" data-id="57">57</div>

                <div class="mesa h m3">M-3</div>
                <div class="silla s94" data-id="94">94</div>
                <div class="silla s95" data-id="95">95</div>
                <div class="silla s92" data-id="92">92</div>
                <div class="silla s93" data-id="93">93</div>

            </div>
        </div>

        <div class="checkout-bar">
            <div class="legend-bar">
                <div class="legend-i"><div class="legend-c" style="background: var(--disponible)"></div> Libre</div>
                <div class="legend-i"><div class="legend-c" style="background: var(--seleccionado)"></div> Seleccionado</div>
                <div class="legend-i"><div class="legend-c" style="background: var(--ocupado)"></div> Obstruido / Ocupado</div>
            </div>
            <button id="btnAction" class="btn-reservation"></button>
        </div>
    </div>

    <script>
        const seleccionados = new Set();
        const btnAction = document.getElementById('btnAction');

        document.querySelectorAll('.silla').forEach(silla => {
            silla.addEventListener('click', () => {
                if (silla.classList.contains('occupied')) return;
                const id = silla.getAttribute('data-id');
                
                if (seleccionados.has(id)) {
                    seleccionados.delete(id);
                    silla.classList.remove('selected');
                } else {
                    seleccionados.add(id);
                    silla.classList.add('selected');
                }

                if (seleccionados.size > 0) {
                    btnAction.style.display = 'block';
                    btnAction.textContent = `RESERVAR ${seleccionados.size} LUGAR(ES) ($${seleccionados.size * 350})`;
                } else {
                    btnAction.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
