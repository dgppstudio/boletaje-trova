<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Asientos - PLANTA BAJA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #000033;
            --accent: #eb5e28;
            --disponible: #008744; /* Verde de tu plano */
            --seleccionado: #f1c40f; /* Amarillo interactivo */
            --ocupado: #d32f2f; /* Rojo */
            --bg-body: #0f172a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        /* Contenedor tipo Mockup de Celular */
        .phone-wrapper {
            width: 100%;
            max-width: 430px;
            background-color: #ffffff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            min-height: 92vh;
        }

        .app-header {
            background-color: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
        }
        .app-header h1 { font-family: 'Urbanist', sans-serif; margin: 0; font-size: 18px; letter-spacing: 1px; }
        .app-header p { margin: 4px 0 0 0; font-size: 12px; color: #cbd5e1; }

        /* Contenedor del Mapa con Scroll Interno si se requiere */
        .map-area {
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
            background-color: #f8fafc;
        }

        .stage-box {
            background-color: #008744;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Urbanist', sans-serif;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        /* Distribución de las zonas en columnas de la Planta Baja */
        .floor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .grid-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        /* Estilos de las Mesas de la Fábrica */
        .mesa-node {
            background-color: #008744;
            color: white;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
        }
        
        /* Formas según tu imagen */
        .rect-v { width: 35px; height: 65px; } /* Mesas 2, 3, 7, 8, 9, B1, B2 */
        .rect-h { width: 65px; height: 35px; } /* Mesa 1, 4, 5 */
        .diamond { width: 45px; height: 45px; transform: rotate(45deg); }
        .diamond span { transform: rotate(-45deg); } /* Enderezar texto */
        
        .bar-v { width: 30px; height: 110px; background-color: #008744; border-radius: 4px;} /* Barras R1, R2, R3 */

        /* Sistema de Sillas/Asientos */
        .asientos-cluster {
            display: flex;
            gap: 4px;
            justify-content: center;
            align-items: center;
        }
        .cluster-v { flex-direction: column; }
        .cluster-h { flex-direction: row; }

        .silla {
            width: 22px;
            height: 22px;
            background-color: var(--disponible);
            color: white;
            font-size: 9px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .silla.selected { background-color: var(--seleccionado); color: #000; }
        .silla.occupied { background-color: var(--ocupado); cursor: not-allowed; }

        /* Barra de información fija abajo (UX Mobile) */
        .checkout-bar {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .legend-bar {
            display: flex;
            justify-content: space-around;
            font-size: 11px;
            color: #64748b;
        }
        .legend-i { display: flex; align-items: center; gap: 4px; }
        .legend-c { width: 10px; height: 10px; border-radius: 2px; }

        .btn-reservation {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.5px;
            display: none; /* Se activa al elegir lugares */
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <header class="app-header">
            <h1>RESERVA TU LUGAR</h1>
            <p>Noche de Trova - Capacidad: 96 Asientos</p>
        </header>

        <div class="map-area">
            <div class="stage-box">ESCENARIO</div>

            <div class="floor-grid">
                
                <div class="grid-col">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <div class="asientos-cluster cluster-v">
                            <div class="silla" data-id="1">1</div>
                            <div class="silla" data-id="2">2</div>
                        </div>
                        <div class="mesa-node rect-h">M-1 / M-5</div>
                        <div class="asientos-cluster cluster-v">
                            <div class="silla" data-id="6">6</div>
                            <div class="silla" data-id="5">5</div>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 5px;">
                        <div class="asientos-cluster cluster-v">
                            <div class="silla" data-id="42">42</div>
                            <div class="silla" data-id="43">43</div>
                            <div class="silla occupied">44</div>
                            <div class="silla" data-id="45">45</div>
                        </div>
                        <div class="bar-v" style="height: 140px;"><span style="color:white; font-size:10px; padding: 5px; display:block;">R-2</span></div>
                        <div class="asientos-cluster cluster-v">
                            <div class="silla" data-id="51">51</div>
                            <div class="silla" data-id="50">50</div>
                            <div class="silla" data-id="49">49</div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 5px;">
                        <div class="bar-v" style="height: 120px;"><span style="color:white; font-size:10px; padding: 5px; display:block;">R-3</span></div>
                        <div class="asientos-cluster cluster-v">
                            <div class="silla" data-id="60">60</div>
                            <div class="silla" data-id="61">61</div>
                            <div class="silla" data-id="62">62</div>
                        </div>
                    </div>

                    <div class="asientos-cluster cluster-h">
                        <div class="silla" data-id="74">74</div>
                        <div class="mesa-node rect-v">M-9</div>
                        <div class="silla" data-id="75">75</div>
                    </div>
                </div>

                <div class="grid-col" style="justify-content: center; gap: 30px;">
                    <div style="position: relative; margin: 20px 0;">
                        <div class="mesa-node diamond"><span>M-6</span></div>
                        <div class="silla" data-id="52" style="position: absolute; top: -25px; left: 12px;">52</div>
                        <div class="silla" data-id="57" style="position: absolute; top: 12px; right: -25px;">57</div>
                        <div class="silla" data-id="55" style="position: absolute; bottom: -25px; left: 12px;">55</div>
                        <div class="silla" data-id="53" style="position: absolute; top: 12px; left: -25px;">53</div>
                    </div>

                    <div class="asientos-cluster cluster-v">
                        <div class="asientos-cluster cluster-h">
                            <div class="silla" data-id="66">66</div>
                            <div class="silla" data-id="67">67</div>
                        </div>
                        <div class="mesa-node rect-h" style="width: 50px;">M-7</div>
                        <div class="asientos-cluster cluster-h">
                            <div class="silla" data-id="68">68</div>
                            <div class="silla" data-id="69">69</div>
                        </div>
                    </div>

                    <div class="asientos-cluster cluster-v">
                        <div class="asientos-cluster cluster-h">
                            <div class="silla" data-id="94">94</div>
                            <div class="silla" data-id="95">95</div>
                        </div>
                        <div class="mesa-node rect-h" style="width: 50px;">M-3</div>
                        <div class="asientos-cluster cluster-h">
                            <div class="silla" data-id="92">92</div>
                            <div class="silla" data-id="93">93</div>
                        </div>
                    </div>

                    <div class="asientos-cluster cluster-v">
                        <div class="asientos-cluster cluster-h">
                            <div class="silla" data-id="90">90</div>
                            <div class="silla" data-id="91">91</div>
                        </div>
                        <div class="mesa-node rect-h" style="width: 50px;">M-2</div>
                        <div class="asientos-cluster cluster-h">
                            <div class="silla occupied">88</div>
                            <div class="silla" data-id="89">89</div>
                        </div>
                    </div>
                </div>

                <div class="grid-col">
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <span style="font-size: 9px; font-weight: bold; color: var(--primary)">ZONA BIS</span>
                        <div class="asientos-cluster cluster-h">
                            <div class="silla" data-id="13">13</div>
                            <div class="silla" data-id="14">14</div>
                            <div class="silla" data-id="18">18</div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 5px; margin-top: 20px;">
                        <div class="asientos-cluster cluster-v">
                            <div class="silla" data-id="32">32</div>
                            <div class="silla" data-id="33">33</div>
                            <div class="silla" data-id="34">34</div>
                        </div>
                        <div class="bar-v" style="height: 110px;"><span style="color:white; font-size:10px; padding: 5px; display:block;">R-1</span></div>
                    </div>
                </div>

            </div>
        </div>

        <div class="checkout-bar">
            <div id="checkout-resumen" style="font-size: 13px; font-weight: bold; color: #1e293b; text-align: center; margin-bottom: 5px;">
                Selecciona un asiento para comenzar
            </div>
            
            <button id="btn-comprar" style="display: none; width: 100%; background-color: #000033; color: #ffffff; border: none; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-bottom: 5px;">
                Comprar 1 Asistencia ($250)
            </button>
            
            <div class="legend-bar">
                <div class="legend-i"><div class="legend-c libre" style="background-color: #64748b;"></div><span>Disponible</span></div>
                <div class="legend-i"><div class="legend-c tuyol" style="background-color: #10b981;"></div><span>Tu Lugar</span></div>
                <div class="legend-i"><div class="legend-c vendido" style="background-color: #e2e8f0;"></div><span>Vendido</span></div>
            </div>
        </div>
    </div>

    <script>
        const seleccionados = new Set();
        const btnAction = document.getElementById('btnAction');

        document.querySelectorAll('.silla').forEach(silla => {
            silla.addEventListener('click', () => {
                if (silla.classList.contains('occupied')) return;

                const id = silla.getAttribute('data-id');
                
                if (seleccionados.has(id)) {
                    seleccionados.delete(id);
                    silla.classList.remove('selected');
                } else {
                    seleccionados.add(id);
                    silla.classList.add('selected');
                }

                // Actualizar botón según la UX móvil
                if (seleccionados.size > 0) {
                    btnAction.style.display = 'block';
                    btnAction.textContent = `COMPRAR ${seleccionados.size} ASISTENCIA(S) ($${seleccionados.size * 350})`;
                } else {
                    btnAction.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
